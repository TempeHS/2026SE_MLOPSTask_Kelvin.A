<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoL Win Predictor</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/bootstrap.min.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    <link
      rel="manifest"
      href="{{ url_for('static', filename='manifest.json') }}"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">LoL Predictor</a>
        <div class="navbar-nav ms-auto">
          {% if session.get('user') %}
          <span class="navbar-text me-3 text-light">
            Logged in as <strong>{{ session['user'] }}</strong>
          </span>
          <a class="nav-link text-light" href="{{ url_for('logout') }}"
            >Logout</a
          >
          {% else %}
          <a class="nav-link text-light" href="{{ url_for('login') }}">Login</a>
          <a class="nav-link text-light" href="{{ url_for('signup') }}"
            >Sign Up</a
          >
          {% endif %}
        </div>
      </div>
    </nav>

    <main class="container mt-4">{% block content %}{% endblock %}</main>

    <footer class="bg-dark text-light text-center py-3 mt-5">
      <small>&copy; 2026 LoL Win Predictor</small>
    </footer>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>

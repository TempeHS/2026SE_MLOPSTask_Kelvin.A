{% extends 'layout.html' %} {% block content %}
<div class="lol-bg-wrapper">
  <div class="d-flex justify-content-center align-items-center min-vh-100">
    <div class="card p-4" style="width: 100%; max-width: 480px">
      <h1 class="card-title text-center mb-3">Login</h1>
      {% if message %}
      <div class="alert alert-{{ message_type or 'danger' }}">{{ message }}</div>
      {% endif %}
      <form action="/Login.html" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input
            type="text"
            class="form-control"
            id="username"
            name="username"
            required
            autocomplete="username"
          />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <div class="input-group">
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              required
              autocomplete="current-password"
            />
            <button
              class="btn btn-outline-secondary"
              type="button"
              id="togglePassword"
              onclick="
                const p = document.getElementById('password');
                p.type = p.type === 'password' ? 'text' : 'password';
                this.textContent = p.type === 'password' ? 'Show' : 'Hide';
              "
            >
              Show
            </button>
          </div>
        </div>
        <div class="form-text mb-3">
          Don't have an account? <a href="/Signup.html">Sign Up</a>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
